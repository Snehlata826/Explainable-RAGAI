name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
        run: git push --force https://23bced49:$HF_API_TOKEN@huggingface.co/spaces/23bced49/explainable-ragai-ui main
